syntax = "proto3";

package tradetracker.v1;

option go_package = "trade-tracker-go/gen/tradetracker/v1;tradetrackerpb";

import "google/protobuf/timestamp.proto";

// Account represents a trading account at a broker.
message Account {
  string id = 1;
  string broker = 2;
  string account_number = 3;
  string name = 4;
  google.protobuf.Timestamp created_at = 5;
}

service AccountService {
  rpc ListAccounts(ListAccountsRequest) returns (ListAccountsResponse);
  rpc GetAccount(GetAccountRequest) returns (GetAccountResponse);
  rpc CreateAccount(CreateAccountRequest) returns (CreateAccountResponse);
  rpc UpdateAccount(UpdateAccountRequest) returns (UpdateAccountResponse);
}

// ListAccountsRequest has no filter parameters; all accounts are returned.
// page_size and page_token are reserved for future pagination support.
message ListAccountsRequest {
  int32 page_size = 1;
  string page_token = 2;
}

message ListAccountsResponse {
  repeated Account accounts = 1;
  string next_page_token = 2;
}

message GetAccountRequest {
  string id = 1;
}

message GetAccountResponse {
  Account account = 1;
}

message CreateAccountRequest {
  string broker = 1;
  string account_number = 2;
  string name = 3; // optional display name
}

message CreateAccountResponse {
  Account account = 1;
}

// UpdateAccountRequest updates mutable account fields.
// Only name may be changed; broker and account_number are immutable.
message UpdateAccountRequest {
  string id = 1;
  string name = 2;
}

message UpdateAccountResponse {
  Account account = 1;
}
